services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: gestor-tickets-app
    env_file:
      - .env
    working_dir: /app
    volumes:
      - ./app:/app
      - ../docker-data/app-uploads:/data/uploads
      - ../docker-data/app-logs:/data/logs
    ports:
      - "127.0.0.1:${APP_PORT:-18081}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - frontend
      - backend
    restart: unless-stopped

  postgres:
    build:
      context: .
      dockerfile: docker/postgres/Dockerfile
    container_name: gestor-tickets-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gestor_tickets}
      POSTGRES_USER: ${POSTGRES_USER:-gestor_tickets}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-15432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gestor_tickets} -d ${POSTGRES_DB:-gestor_tickets}"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - backend
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: gestor-tickets-pgadmin
    env_file:
      - .env
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "127.0.0.1:${PGADMIN_PORT:-18083}:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - frontend
      - backend
    restart: unless-stopped

  glpi-db:
    image: mariadb:11.4
    container_name: gestor-tickets-glpi-db
    env_file:
      - .env
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - glpi_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u root -p$${MARIADB_ROOT_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      - backend
    restart: unless-stopped

  glpi:
    image: glpi/glpi:latest
    container_name: gestor-tickets-glpi
    env_file:
      - .env
    environment:
      GLPI_DB_HOST: ${GLPI_DB_HOST:-glpi-db}
      GLPI_DB_PORT: ${GLPI_DB_PORT:-3306}
      GLPI_DB_NAME: ${GLPI_DB_NAME:-glpi}
      GLPI_DB_USER: ${GLPI_DB_USER:-glpi}
      GLPI_DB_PASSWORD: ${GLPI_DB_PASSWORD}
      GLPI_CRONTAB_ENABLED: ${GLPI_CRONTAB_ENABLED:-1}
      GLPI_SKIP_AUTOINSTALL: ${GLPI_SKIP_AUTOINSTALL:-false}
      GLPI_SKIP_AUTOUPDATE: ${GLPI_SKIP_AUTOUPDATE:-false}
    volumes:
      - glpi_data:/var/glpi
    ports:
      - "127.0.0.1:${GLPI_PORT:-18082}:80"
    depends_on:
      glpi-db:
        condition: service_healthy
    networks:
      - frontend
      - backend
    restart: unless-stopped

networks:
  frontend:
    name: gestor-tickets-frontend
  backend:
    name: gestor-tickets-backend

volumes:
  postgres_data:
  pgadmin_data:
  glpi_db_data:
  glpi_data:
