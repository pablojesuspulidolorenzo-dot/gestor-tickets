<header class="app-header">
    <div class="logo-section">
        <div class="logo-icon">GT</div>
        <h1 class="logo-text">gestor-tickets</h1>
    </div>

    <nav class="top-nav">
        <a href="/app" class="nav-btn {% if active_section == 'panel' %}active{% endif %}">Panel</a>
        <a href="/inbox" class="nav-btn {% if active_section in ('inbox', 'mailbox', 'threads') %}active{% endif %}">Bandeja</a>
        <a href="/tickets" class="nav-btn {% if active_section == 'tickets' %}active{% endif %}">Tickets GLPI</a>
        <a href="/ingestion" class="nav-btn {% if active_section == 'ingestion' %}active{% endif %}">Ingesta</a>
        <a href="/accounts" class="nav-btn {% if active_section == 'accounts' %}active{% endif %}">Cuentas</a>
        <a href="/settings" class="nav-btn {% if active_section in ('settings', 'ai_settings') %}active{% endif %}">Configuración</a>
    </nav>

    <div class="system-status">
        <button class="{{ 'assistant-toggle is-on' if assistant_mode else 'assistant-toggle' }}"
                hx-post="/settings/assistant-mode"
                hx-target="this"
                hx-swap="outerHTML"
                title="Modo asistente didáctico — clic para activar/desactivar">
            {{ "Asistente ON" if assistant_mode else "Asistente OFF" }}
        </button>
        <span class="version-text">{{ version.full }}</span>
        <form method="post" action="/logout">
            <button class="logout-button">Salir</button>
        </form>
    </div>
</header>
