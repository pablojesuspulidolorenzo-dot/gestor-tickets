{% extends "base.html" %}

{% block title %}Acceso - Gestor Tickets{% endblock %}

{% block content %}
<header class="app-header">
    <div class="logo-section">
        <div class="logo-icon">GT</div>
        <h1 class="logo-text">gestor-tickets</h1>
    </div>
    <div class="system-status">
        <div class="status-badge prod">
            <span class="badge-dot"></span>
            Docker activo
        </div>
        <span class="version-text">{{ version.full }}</span>
    </div>
</header>

<main class="config-page-shell">
    <section class="config-card" style="max-width: 520px;">
        <div>
            <h2 style="font-size: 1.45rem; margin-bottom: 8px;">Acceso al gestor</h2>
            <p style="color: var(--text-secondary); line-height: 1.5;">
                Entra con la cuenta colaborativa. La contraseña se valida contra GLPI.
            </p>
        </div>

        {% if error %}
        <div class="scheduled-alert scheduled-alert-error">
            {{ error }}
        </div>
        {% endif %}

        <form method="post" action="/login" style="display: flex; flex-direction: column; gap: 16px;">
            <label style="display: flex; flex-direction: column; gap: 6px;">
                <span style="font-weight: 700;">Usuario</span>
                <input
                    type="text"
                    name="login_identifier"
                    value="{{ login_identifier }}"
                    autocomplete="username"
                    required
                    style="padding: 12px; border: 1px solid var(--border-color); border-radius: 8px;"
                >
                <small style="color: var(--text-muted);">
                    Ejemplo cuenta principal: sistemas-tic@gestor-tickets.es
                </small>
            </label>

            <label style="display: flex; flex-direction: column; gap: 6px;">
                <span style="font-weight: 700;">Contraseña</span>
                <input
                    type="password"
                    name="password"
                    autocomplete="current-password"
                    required
                    style="padding: 12px; border: 1px solid var(--border-color); border-radius: 8px;"
                >
            </label>

            <button
                type="submit"
                class="nav-btn active"
                style="justify-content: center; cursor: pointer; padding: 12px;"
            >
                Entrar
            </button>
        </form>
    </section>
</main>
{% endblock %}
